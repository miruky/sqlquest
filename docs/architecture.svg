<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" role="img" aria-label="sqlquestのアーキテクチャ図">
  <title>sqlquestのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: #8b949e; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: #4f7cc7; stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #2456a6; }
    .arrow { stroke: #8b949e; stroke-width: 1.5; fill: none; marker-end: url(#head); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="180" height="64" rx="8" class="accent-box"/>
  <text x="40" y="46" class="accent-label">quests.ts</text>
  <text x="40" y="68" class="small">14問の出題と模範解答</text>

  <rect x="20" y="166" width="180" height="64" rx="8" class="accent-box"/>
  <text x="40" y="192" class="accent-label">dataset.ts</text>
  <text x="40" y="214" class="small">商店街のスキーマと初期データ</text>

  <rect x="280" y="90" width="170" height="70" rx="8" class="accent-box"/>
  <text x="300" y="118" class="accent-label">judge.ts</text>
  <text x="300" y="140" class="small">ユーザーSQLと模範解答を照合</text>

  <rect x="530" y="90" width="170" height="70" rx="8" class="box"/>
  <text x="550" y="118" class="label">engine.ts</text>
  <text x="550" y="140" class="small">sql.js / 使い捨てDB</text>

  <rect x="760" y="90" width="120" height="70" rx="8" class="box"/>
  <text x="780" y="118" class="label">SQLite</text>
  <text x="780" y="140" class="small">WASM</text>

  <rect x="280" y="20" width="170" height="44" rx="8" class="accent-box"/>
  <text x="300" y="47" class="accent-label">app.ts</text>

  <path class="arrow" d="M200 52 C240 56 250 35 272 40"/>
  <path class="arrow" d="M365 64 V82"/>
  <path class="arrow" d="M200 198 C250 195 480 175 535 162"/>
  <path class="arrow" d="M450 125 H522"/>
  <path class="arrow" d="M700 125 H752"/>
</svg>
